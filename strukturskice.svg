<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 2000" width="100%" height="100%">
    <!-- Background -->
    <rect width="1000" height="2000" fill="#ffffff" />
    
    <!-- Title -->
    <text x="500" y="50" font-family="sans-serif" font-size="24" font-weight="bold" fill="#64748b" text-anchor="middle">Lapas struktūrskice (Wireframe)</text>
    
    <!-- Header -->
    <rect x="50" y="80" width="900" height="60" fill="#0f172a" rx="4"/>
    <text x="80" y="118" font-family="sans-serif" font-size="20" font-weight="bold" fill="#10b981">WeekIvo &lt;/&gt;</text>
    
    <!-- Nav items placeholders -->
    <rect x="400" y="102" width="60" height="15" fill="#334155" rx="4"/>
    <rect x="480" y="102" width="70" height="15" fill="#334155" rx="4"/>
    <rect x="570" y="102" width="60" height="15" fill="#334155" rx="4"/>
    <rect x="650" y="102" width="80" height="15" fill="#334155" rx="4"/>
    <rect x="750" y="102" width="70" height="15" fill="#334155" rx="4"/>
    
    <!-- Theme toggle placeholder -->
    <circle cx="910" cy="110" r="12" fill="#334155"/>

    <!-- Hero Section -->
    <rect x="50" y="140" width="900" height="400" fill="#1e293b" />
    <text x="500" y="270" font-family="sans-serif" font-size="42" font-weight="bold" fill="#f8fafc" text-anchor="middle">Datorikas nodaļas <tspan fill="#10b981">studenta</tspan></text>
    <text x="500" y="320" font-family="sans-serif" font-size="42" font-weight="bold" fill="#10b981" text-anchor="middle">ikdiena</text>
    
    <!-- Hero paragraph placeholder lines -->
    <rect x="300" y="360" width="400" height="12" fill="#475569" rx="4"/>
    <rect x="320" y="385" width="360" height="12" fill="#475569" rx="4"/>
    <rect x="350" y="410" width="300" height="12" fill="#475569" rx="4"/>
    
    <!-- Buttons -->
    <rect x="380" y="450" width="130" height="40" fill="#10b981" rx="8"/>
    <rect x="530" y="450" width="130" height="40" fill="transparent" stroke="#475569" stroke-width="2" rx="8"/>

    <!-- Content Sections: Zig Zag -->
    <!-- 1. Klātiene -->
    <text x="50" y="600" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f172a">Klātienes Diena:</text>
    <text x="50" y="640" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f172a">Lekcijas un Laboratorijas</text>
    
    <!-- Card inside ZigZag -->
    <rect x="50" y="680" width="400" height="240" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="16"/>
    <rect x="80" y="710" width="200" height="18" fill="#10b981" rx="4"/>
    <rect x="80" y="750" width="340" height="12" fill="#94a3b8" rx="4"/>
    <rect x="80" y="770" width="300" height="12" fill="#94a3b8" rx="4"/>
    
    <circle cx="90" cy="815" r="5" fill="#10b981"/>
    <rect x="110" y="810" width="280" height="10" fill="#cbd5e1" rx="3"/>
    
    <circle cx="90" cy="845" r="5" fill="#10b981"/>
    <rect x="110" y="840" width="290" height="10" fill="#cbd5e1" rx="3"/>
    
    <circle cx="90" cy="875" r="5" fill="#10b981"/>
    <rect x="110" y="870" width="250" height="10" fill="#cbd5e1" rx="3"/>

    <!-- Image placeholder right -->
    <rect x="500" y="680" width="450" height="300" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10 5" rx="16"/>
    <line x1="500" y1="680" x2="950" y2="980" stroke="#cbd5e1" stroke-width="2" />
    <line x1="950" y1="680" x2="500" y2="980" stroke="#cbd5e1" stroke-width="2" />
    <circle cx="725" cy="830" r="30" fill="#e2e8f0"/>
    <circle cx="725" cy="830" r="20" fill="#ffffff"/>

    <!-- 2. Attalinati (Reverse) -->
    <text x="950" y="1030" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="end">Attālināti:</text>
    <text x="950" y="1070" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="end">E-studijas &amp; Pašmācība</text>
    
    <!-- Image placeholder left -->
    <rect x="50" y="1110" width="450" height="300" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10 5" rx="16"/>
    <line x1="50" y1="1110" x2="500" y2="1410" stroke="#cbd5e1" stroke-width="2" />
    <line x1="500" y1="1110" x2="50" y2="1410" stroke="#cbd5e1" stroke-width="2" />
    <circle cx="275" cy="1260" r="30" fill="#e2e8f0"/>
    <circle cx="275" cy="1260" r="20" fill="#ffffff"/>

    <!-- Card inside ZigZag right -->
    <rect x="550" y="1110" width="400" height="240" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="16"/>
    <rect x="580" y="1140" width="200" height="18" fill="#10b981" rx="4"/>
    <rect x="580" y="1180" width="340" height="12" fill="#94a3b8" rx="4"/>
    <rect x="580" y="1200" width="300" height="12" fill="#94a3b8" rx="4"/>
    
    <circle cx="590" cy="1245" r="5" fill="#10b981"/>
    <rect x="610" y="1240" width="280" height="10" fill="#cbd5e1" rx="3"/>
    
    <circle cx="590" cy="1275" r="5" fill="#10b981"/>
    <rect x="610" y="1270" width="290" height="10" fill="#cbd5e1" rx="3"/>
    
    <circle cx="590" cy="1305" r="5" fill="#10b981"/>
    <rect x="610" y="1300" width="250" height="10" fill="#cbd5e1" rx="3"/>

    <!-- 3. Arpus Koda: Grid -->
    <text x="500" y="1500" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">Ārpus Koda:</text>
    <text x="500" y="1540" font-family="sans-serif" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">Kopiena un Pasākumi</text>

    <!-- Grid items -->
    <!-- Item 1 -->
    <rect x="50" y="1580" width="280" height="250" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="16"/>
    <circle cx="190" cy="1640" r="30" fill="#f1f5f9" stroke="#10b981" stroke-width="3"/>
    <rect x="140" y="1690" width="100" height="16" fill="#0f172a" rx="4"/>
    <rect x="80" y="1730" width="220" height="10" fill="#94a3b8" rx="3"/>
    <rect x="80" y="1750" width="200" height="10" fill="#94a3b8" rx="3"/>
    <rect x="80" y="1770" width="180" height="10" fill="#94a3b8" rx="3"/>
    
    <!-- Item 2 -->
    <rect x="360" y="1580" width="280" height="250" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="16"/>
    <circle cx="500" cy="1640" r="30" fill="#f1f5f9" stroke="#10b981" stroke-width="3"/>
    <rect x="450" y="1690" width="100" height="16" fill="#0f172a" rx="4"/>
    <rect x="390" y="1730" width="220" height="10" fill="#94a3b8" rx="3"/>
    <rect x="390" y="1750" width="210" height="10" fill="#94a3b8" rx="3"/>
    <rect x="390" y="1770" width="180" height="10" fill="#94a3b8" rx="3"/>

    <!-- Item 3 -->
    <rect x="670" y="1580" width="280" height="250" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="16"/>
    <circle cx="810" cy="1640" r="30" fill="#f1f5f9" stroke="#10b981" stroke-width="3"/>
    <rect x="760" y="1690" width="100" height="16" fill="#0f172a" rx="4"/>
    <rect x="700" y="1730" width="220" height="10" fill="#94a3b8" rx="3"/>
    <rect x="700" y="1750" width="200" height="10" fill="#94a3b8" rx="3"/>
    <rect x="700" y="1770" width="160" height="10" fill="#94a3b8" rx="3"/>
    
    <!-- Footer -->
    <rect x="50" y="1880" width="900" height="80" fill="#0f172a" rx="4"/>
    <rect x="400" y="1910" width="200" height="12" fill="#475569" rx="4"/>
    <rect x="450" y="1935" width="100" height="8" fill="#475569" rx="3"/>
</svg>
